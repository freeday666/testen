<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Community Page</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  .button { padding: 10px 20px; margin: 10px 0; display: inline-block; background-color: #7289da; color: #fff; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; font-size: 16px; }
  #chat-container { border: 1px solid #ccc; padding: 10px; width: 100%; height: 300px; overflow-y: auto; background: #f9f9f9; margin-top: 20px; }
  #chat-input { width: calc(100% - 60px); padding: 8px; }
  #send-btn { padding: 8px 12px; }
</style>
</head>
<body>

<h1>Welcome to Our Community</h1>

<!-- Join Discord Button -->
<a class="button" href="https://discord.gg/DVaVupy5CK" target="_blank">Join Our Discord Server</a>

<!-- Sign in with Discord Button -->
<button id="discord-login" class="button">Sign in with Discord</button>

<!-- Display username if signed in -->
<div id="user-info"></div>

<!-- Live Chat -->
<h2>Live Chat</h2>
<div id="chat-container"></div>
<input type="text" id="chat-input" placeholder="Type your message..." />
<button id="send-btn">Send</button>

<!-- Link to load chat script -->
<script src="chat.js"></script>

<script>
// OAuth Sign-in URL
const oauthUrl = "https://discord.com/oauth2/authorize?client_id=1437760476611215402&response_type=code&redirect_uri=http%3A%2F%2Flocalhost%3A3000%2Foauth%2Fcallback&scope=identify%20guilds%20email";

// Handle Sign in button
document.getElementById('discord-login').onclick = () => {
  window.location.href = oauthUrl;
};

// Check if user info is stored
const userInfoDiv = document.getElementById('user-info');
const username = localStorage.getItem('discord_username');

if (username) {
  userInfoDiv.innerHTML = `Signed in as: <strong>${username}</strong>`;
} else {
  userInfoDiv.innerHTML = 'Not signed in.';
}

// Simulate OAuth callback (for demo purposes)
// In real implementation, your backend should handle OAuth and set user info
if (window.location.search.includes('code=')) {
  // Normally, you would exchange code for token server-side
  // Here, just simulate sign-in
  const dummyUsername = "DiscordUser"; // Replace with actual user info from backend
  localStorage.setItem('discord_username', dummyUsername);
  document.getElementById('user-info').innerHTML = `Signed in as: <strong>${dummyUsername}</strong>`;
  // Redirect back to clear URL
  window.history.replaceState({}, document.title, "/");
}
</script>

</body>
</html>
