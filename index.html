<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freddo Community</title>
<style>
  /* Algemene stijl */
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.4&auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    color: #fff;
  }

  /* Overlay voor beter contrast */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
  }

  /* Header stijl */
  header {
    text-align: center;
    padding: 30px 20px;
    background: rgba(0,0,0,0.3);
  }

  header h1 {
    font-size: 3em;
    margin: 0;
    letter-spacing: 2px;
  }

  /* Main content layout */
  .container {
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  /* Live stream section */
  .stream {
    flex: 2;
    min-width: 300px;
    margin-right: 20px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
  }

  /* Chat section */
  .chat {
    flex: 1;
    min-width: 250px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    height: 500px;
  }

  /* Chat display area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    margin-bottom: 10px;
  }

  /* Chat input */
  .chat-input {
    display: flex;
  }

  .chat-input input {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 4px;
  }

  .chat-input button {
    padding: 8px 12px;
    margin-left: 8px;
    background-color: #ff4d4d;
    border: none;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    margin-top: 20px;
  }

  /* Responsive aanpassen */
  @media(max-width: 768px) {
    .container {
      flex-direction: column;
    }
    .stream, .chat {
      margin: 10px 0;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Freddo Community</h1>
</header>

<div class="container">
  <!-- Live Stream -->
  <div class="stream">
    <h2 style="text-align:center;">Live Stream</h2>
    <iframe width="100%" height="480" src="https://www.youtube.com/embed/0MOkLkTP-Jk?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <!-- Live Chat -->
  <div class="chat">
    <h2 style="text-align:center;">Live Chat</h2>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Typ hier..."/>
      <button onclick="sendMessage()">Verstuur</button>
    </div>
  </div>
</div>

<footer>
  &copy; 2024 Freddo Community. Alle rechten voorbehouden.
</footer>

<script>
  // Simpele chat functionaliteit
  const chatMessages = document.getElementById('chatMessages');

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (message !== "") {
      const messageElem = document.createElement('div');
      messageElem.textContent = "You: " + message;
      chatMessages.appendChild(messageElem);
      input.value = "";
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      // Simuleer een antwoord
      setTimeout(() => {
        const reply = document.createElement('div');
        reply.textContent = "FreddoBot: Dank je wel voor je bericht!";
        chatMessages.appendChild(reply);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 1000);
    }
  }
</script>

</body>
</html>
