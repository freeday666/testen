<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIVEM Hosting</title>
<!-- Google Fonts of ander styling -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #0d0d0d;
    color: #fff;
  }
  header {
    background-color: #1a1a1a;
    padding: 20px;
    text-align: center;
  }
  h1 {
    margin: 0;
  }
  .container {
    padding: 20px;
  }
  .button {
    background-color: #ff4b2b;
    border: none;
    padding: 15px 30px;
    color: #fff;
    cursor: pointer;
    font-size: 1.2em;
    border-radius: 8px;
    transition: background 0.3s;
  }
  .button:hover {
    background-color: #ff1a00;
  }
  /* Phone sectie */
  .phone {
    margin-top: 30px;
    padding: 20px;
    background-color: #222;
    border-radius: 10px;
  }
  /* Footer */
  footer {
    background-color: #1a1a1a;
    text-align: center;
    padding: 10px;
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <h1>FIVEM Server Hosting</h1>
</header>

<div class="container">
  <h2>Welkom bij je FIVEM hosting</h2>
  <p>Start je server, beheer en meer, alles in één moderne interface.</p>
  
  <button class="button" onclick="startServer()">Start Server</button>
  <button class="button" onclick="stopServer()">Stop Server</button>
  
  <!-- Telefoon functie -->
  <div class="phone" id="phoneSection">
    <h3>Telefoon</h3>
    <input type="text" id="phoneNumber" placeholder="Voer telefoonnummer in" />
    <button class="button" onclick="sendSMS()">Verstuur SMS</button>
    <div id="smsStatus"></div>
  </div>
</div>

<footer>
  &copy; 2024 FreddoDevX. Alle rechten voorbehouden.
</footer>

<script>
  function startServer() {
    alert('Server wordt gestart...');
    // Hier zou je een API call kunnen doen naar je backend
  }
  function stopServer() {
    alert('Server wordt gestopt...');
  }
  function sendSMS() {
    const number = document.getElementById('phoneNumber').value;
    if (number) {
      document.getElementById('smsStatus').innerText = 'SMS verzonden naar ' + number;
      // Hier zou je API call naar SMS service
    } else {
      alert('Voer een telefoonnummer in.');
    }
  }
</script>

</body>
</html>
