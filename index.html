<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realtime Chat met Socket.IO</title>
<!-- Voeg socket.io client script toe -->
<script src="/socket.io/socket.io.js"></script>
<style>
  /* eenvoudige styling */
</style>
</head>
<body>

<h1>Realtime Chat</h1>
<div id="chatBox" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>
<input type="text" id="chatInput" placeholder="Typ je bericht..." />
<button id="sendBtn">Verzend</button>

<script>
  const socket = io();

  const chatBox = document.getElementById('chatBox');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');

  // Verstuur bericht
  sendBtn.onclick = () => {
    const bericht = chatInput.value.trim();
    if (bericht !== "") {
      socket.emit('chatbericht', { bericht: bericht });
      chatInput.value = "";
    }
  };

  // Ontvang berichten
  socket.on('chatbericht', (data) => {
    const div = document.createElement('div');
    div.innerHTML = `<strong>Gebruiker:</strong> ${data.bericht}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
</script>

</body>
</html>
