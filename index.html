<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freddo Community</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Freddo Community</h1>
  <div class="nav-buttons">
    <button id="loginBtn">Inloggen</button>
    <button id="signupBtn">Account Maken</button>
  </div>
</header>

<div class="container">
  <div class="streaming">
    <h2>Live Stream</h2>
    <div class="video-placeholder">Live Video Stream</div>
    <div class="buttons" style="margin-top:10px;">
      <button id="shareBtn">Delen</button>
      <button id="chatBtn">Chatten</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="viewers">
      <h3>Kijkers</h3>
      <ul id="viewersList">
        <li>FreddoFan1</li>
        <li>Streamer123</li>
        <li>ViewerXYZ</li>
      </ul>
    </div>
    <div class="chat" id="chatContainer" style="display:none;">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Typ je bericht..." />
        <button id="sendBtn">Verstuur</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
