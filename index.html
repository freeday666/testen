<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freddo Community</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background-color:#f0f0f0;
  }
  header {
    display:flex;
    justify-content: space-between;
    align-items: center;
    background-color:#333;
    color:#fff;
    padding:10px 20px;
  }
  .nav-buttons {
    display:flex;
    gap:10px;
  }
  .nav-buttons button {
    padding:8px 12px;
    background-color:#555;
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
  .container {
    display:flex;
    padding:20px;
    gap:20px;
  }
  .streaming {
    flex:2;
    background-color:#fff;
    padding:10px;
    border-radius:8px;
  }
  .video-placeholder {
    width:100%;
    height:400px;
    background-color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:24px;
  }
  .sidebar {
    flex:1;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .buttons {
    display:flex;
    gap:10px;
  }
  button {
    padding:8px 12px;
    background-color:#007bff;
    color:#fff;
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
  .viewers {
    background-color:#eee;
    border-radius:8px;
    padding:10px;
    max-height:200px;
    overflow-y:auto;
  }
  .viewers h3 {
    margin-top:0;
  }
  .chat {
    flex:1;
    display:flex;
    flex-direction:column;
    background-color:#fff;
    border-radius:8px;
    overflow:hidden;
  }
  .chat-messages {
    flex:1;
    padding:10px;
    overflow-y:auto;
  }
  .chat-input {
    display:flex;
    border-top:1px solid #ccc;
  }
  .chat-input input {
    flex:1;
    padding:10px;
    border:none;
  }
  .chat-input button {
    padding:10px;
    background-color:#007bff;
    border:none;
    color:#fff;
  }
  .bot {
    background-color:#d1ffd1;
    padding:5px;
    border-radius:4px;
    margin-bottom:5px;
  }
</style>
</head>
<body>

<header>
  <h1>Freddo Community</h1>
  <div class="nav-buttons">
    <button id="loginBtn">Inloggen</button>
    <button id="signupBtn">Account Maken</button>
  </div>
</header>

<div class="container">
  <div class="streaming">
    <h2>Live Stream</h2>
    <div class="video-placeholder">Live Video Stream</div>
    <div class="buttons" style="margin-top:10px;">
      <button id="shareBtn">Delen</button>
      <button id="chatBtn">Chatten</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="viewers">
      <h3>Kijkers</h3>
      <ul id="viewersList">
        <li>FreddoFan1</li>
        <li>Streamer123</li>
        <li>ViewerXYZ</li>
      </ul>
    </div>
    <div class="chat" id="chatContainer" style="display:none;">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Typ je bericht..."/>
        <button id="sendBtn">Verstuur</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Basis JavaScript voor knop functionaliteit
  document.getElementById('chatBtn').addEventListener('click', () => {
    const chat = document.getElementById('chatContainer');
    chat.style.display = chat.style.display === 'none' ? 'flex' : 'none';
  });

  document.getElementById('sendBtn').addEventListener('click', () => {
    const input = document.getElementById('chatInput');
    const messageText = input.value.trim();
    if (messageText !== '') {
      const messageDiv = document.createElement('div');
      messageDiv.innerHTML = `<strong>FreddoBot:</strong> ${messageText}`;
      document.getElementById('chatMessages').appendChild(messageDiv);
      input.value = '';
    }
  });

  // Voeg enkele bot berichten toe
  const botMessage = (msg) => {
    const botDiv = document.createElement('div');
    botDiv.className = 'bot';
    botDiv.innerHTML = `<strong>FreddoBot:</strong> ${msg}`;
    document.getElementById('chatMessages').appendChild(botDiv);
  }

  // Voorbeeld: bot reageert na 2 seconden
  setTimeout(() => {
    botMessage('Hallo! Ik ben FreddoBot.');
  }, 2000);
</script>

</body>
</html>
