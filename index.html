<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freddo Community Live Stream</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #222;
        color: #fff;
        margin: 0;
        padding: 20px;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    h1 {
        margin: 0;
    }
    .stream-chat-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }
    .stream-container {
        flex: 1 1 600px;
        max-width: 800px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    iframe {
        width: 100%;
        height: 480px;
        border: none;
        border-radius: 8px;
    }
    .chat-container {
        flex: 1 1 300px;
        max-width: 400px;
        display: flex;
        flex-direction: column;
    }
    #chatBox {
        background-color: #333;
        padding: 10px;
        height: 480px;
        overflow-y: scroll;
        border-radius: 8px;
        margin-bottom: 10px;
    }
    #chatInput {
        width: calc(100% - 80px);
        padding: 10px;
        border-radius: 4px;
        border: none;
        font-size: 1em;
    }
    #sendBtn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        background-color: #555;
        color: #fff;
        cursor: pointer;
        margin-left: 10px;
    }
    #sendBtn:hover {
        background-color: #777;
    }
    /* Inlog sectie */
    #loginSection {
        display: flex;
        align-items: center;
    }
    #userNameDisplay {
        margin-right: 10px;
        font-weight: bold;
    }
    #loginBtn, #logoutBtn {
        padding: 8px 12px;
        border: none;
        border-radius: 4px;
        background-color: #555;
        color: #fff;
        cursor: pointer;
        margin-left: 5px;
    }
    #loginBtn:hover, #logoutBtn:hover {
        background-color: #777;
    }
    /* Responsive */
    @media(max-width: 900px) {
        .stream-chat-container {
            flex-direction: column;
            align-items: center;
        }
        iframe {
            height: 300px;
        }
        #chatBox {
            height: 300px;
        }
    }
</style>
</head>
<body>

<header>
    <h1>Freddo Community Live Stream</h1>
    <div id="loginSection">
        <span id="userNameDisplay"></span>
        <button id="loginBtn">Inloggen</button>
        <button id="logoutBtn" style="display:none;">Uitloggen</button>
    </div>
</header>

<div class="stream-link" style="text-align:center; margin-bottom:20px;">
    <a href="https://www.youtube.com/live/0MOkLkTP-Jk?is=ufoW6AKAbhYdl6Sj" target="_blank">
        Bekijk de live muziek stream
    </a>
</div>

<div class="stream-chat-container">
    <!-- Livestream in het midden -->
    <div class="stream-container">
        <iframe src="https://www.youtube.com/embed/0MOkLkTP-Jk" allowfullscreen></iframe>
    </div>
    <!-- Chat ernaast -->
    <div class="chat-container">
        <h2>Chat</h2>
        <div id="chatBox"></div>
        <div style="display:flex; align-items:center;">
            <input type="text" id="chatInput" placeholder="Typ je bericht..." disabled />
            <button id="sendBtn" disabled>Verzend</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    const userNameDisplay = document.getElementById('userNameDisplay');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatBox = document.getElementById('chatBox');

    // Inloggen
    loginBtn.onclick = () => {
        const naam = prompt("Voer je gebruikersnaam in:");
        if (naam && naam.trim() !== "") {
            currentUser = naam.trim();
            updateLoginState();
        }
    };

    // Uitloggen
    logoutBtn.onclick = () => {
        currentUser = null;
        updateLoginState();
    };

    function updateLoginState() {
        if (currentUser) {
            userNameDisplay.textContent = "Ingelogd als: " + currentUser;
            loginBtn.style.display = "none";
            logoutBtn.style.display = "inline-block";
            chatInput.disabled = false;
            sendBtn.disabled = false;
        } else {
            userNameDisplay.textContent = "";
            loginBtn.style.display = "inline-block";
            logoutBtn.style.display = "none";
            chatInput.disabled = true;
            sendBtn.disabled = true;
        }
    }

    // Bericht versturen
    sendBtn.onclick = () => {
        sendMessage();
    };

    chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    function sendMessage() {
        const bericht = chatInput.value.trim();
        if (bericht !== "" && currentUser) {
            const berichtDiv = document.createElement('div');
            berichtDiv.innerHTML = `<strong>${currentUser}:</strong> ${bericht}`;
            chatBox.appendChild(berichtDiv);
            chatInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // Init
    updateLoginState();
</script>

</body>
</html>
